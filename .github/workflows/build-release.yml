name: Build & Release KrdOS

# Triggers:
#   - Every push to main  → creates/updates the "latest" release
#   - Manual trigger      → useful for testing
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Give the workflow write access to repo contents so it can create releases.
# Without this, GITHUB_TOKEN cannot create tags or releases.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    # -----------------------------------------------------------------------
    # 1. Checkout
    # -----------------------------------------------------------------------
    - name: Checkout source
      uses: actions/checkout@v4

    # -----------------------------------------------------------------------
    # 2. System packages Flutter Linux needs to compile
    # -----------------------------------------------------------------------
    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          clang cmake ninja-build pkg-config \
          libgtk-3-dev libblkid-dev liblzma-dev \
          libglib2.0-dev libpango1.0-dev libcairo2-dev \
          libatk1.0-dev libgdk-pixbuf-2.0-dev \
          libsecret-1-dev libjsoncpp-dev \
          libssl-dev \
          libwebkit2gtk-4.1-dev

    # -----------------------------------------------------------------------
    # 3. Flutter SDK
    # -----------------------------------------------------------------------
    - name: Setup Flutter (stable)
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'
        cache: true

    - name: Enable Linux desktop
      run: flutter config --enable-linux-desktop

    # -----------------------------------------------------------------------
    # 4. Build
    # NOTE: The repo root IS the Flutter project (pubspec.yaml is at root).
    # -----------------------------------------------------------------------
    - name: Flutter pub get
      run: flutter pub get

    - name: Build Linux release
      run: flutter build linux --release

    # -----------------------------------------------------------------------
    # 5. Stamp version into the bundle
    # -----------------------------------------------------------------------
    - name: Create version stamp
      id: ver
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        BUILD_DATE=$(date -u +%Y%m%d-%H%M)
        VERSION="${BUILD_DATE}-${SHORT_SHA}"
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "${VERSION}" > build/linux/x64/release/bundle/version
        echo "${VERSION}" > VERSION

    # -----------------------------------------------------------------------
    # 6. Package
    # -----------------------------------------------------------------------
    - name: Package bundle as tarball
      run: |
        cd build/linux/x64/release
        tar -czf krdos-bundle.tar.gz bundle/
        sha256sum krdos-bundle.tar.gz > krdos-bundle.tar.gz.sha256

    # -----------------------------------------------------------------------
    # 7. Write release notes to a file (avoids YAML/shell quoting issues)
    # -----------------------------------------------------------------------
    - name: Write release notes
      run: |
        VERSION="${{ steps.ver.outputs.VERSION }}"
        SHA="${{ github.sha }}"
        cat > /tmp/release-notes.md << EOF
        # KrdOS ${VERSION}

        Automated build from commit ${SHA}.

        ## Update on your KrdOS machine

        Open the KrdOS terminal and run:

            krdos-update

        The system will download, verify (SHA-256), and install the new version automatically.

        ## Manual install

        Download krdos-bundle.tar.gz and verify with krdos-bundle.tar.gz.sha256
        EOF

    # -----------------------------------------------------------------------
    # 8. Publish release — delete old "latest" then recreate
    # -----------------------------------------------------------------------
    - name: Publish GitHub release
      run: |
        VERSION="${{ steps.ver.outputs.VERSION }}"

        gh release delete latest --yes 2>/dev/null || true
        git push origin :refs/tags/latest 2>/dev/null || true

        gh release create latest \
          --title "KrdOS latest (${VERSION})" \
          --notes-file /tmp/release-notes.md \
          --latest \
          build/linux/x64/release/krdos-bundle.tar.gz \
          build/linux/x64/release/krdos-bundle.tar.gz.sha256 \
          install/setup.sh \
          install/krdos-update.sh \
          install/krdos-offline-update.sh \
          VERSION
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
